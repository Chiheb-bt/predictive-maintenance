name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Stage 1: Quality Gate (Lint & Type Safety)
  # -------------------------------------------------------------------------
  quality-gate:
    name: Code Quality (Ruff & Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
          pip install plotly sqlalchemy aiosqlite mlflow prometheus-client prometheus-fastapi-instrumentator

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        run: mypy src/

  # -------------------------------------------------------------------------
  # Stage 2: Verified Logic (Unit Tests)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Logic Verification (Pytest)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
          pip install plotly sqlalchemy aiosqlite mlflow prometheus-client prometheus-fastapi-instrumentator

      - name: Initialise Audit DB
        run: python -c "import asyncio; from src.core.database import init_db; asyncio.run(init_db())"

      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/unit/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------------------------------------------------------
  # Stage 3: ML Pipeline (End-to-End)
  # -------------------------------------------------------------------------
  ml-pipeline:
    name: ML Lifecycle (Train & Verify)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install plotly sqlalchemy aiosqlite mlflow

      - name: Seed CI Data
        run: PYTHONPATH=. python scripts/generate_ci_data.py --rows 500

      - name: Execution: Training Run
        run: PYTHONPATH=. python src/models/train.py --data Data/maintenance_ci.csv --no-search

      - name: Smoke Test: Inference Engine
        run: |
          PYTHONPATH=. python -c "
          from src.serving.inference import load_model, predict
          load_model()
          res = predict({'Type':'M','Air_temperature':298,'Process_temperature':308,'Rotational_speed':1500,'Torque':40,'Tool_wear':0})
          print(f'Prediction: {res['risk_level']}')
          "
