name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Stage 1: lint + type-check + unit tests (no model, no training — fast feedback)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Lint, type-check, and unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package and dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Type-check with mypy
        run: mypy src/
        continue-on-error: false

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=20

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------------------------------------------------------
  # Stage 2: full pipeline (generate data → train → smoke test inference)
  # -------------------------------------------------------------------------
  pipeline-tests:
    name: Full pipeline (train + infer)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Generate synthetic training data
        run: PYTHONPATH=. python scripts/generate_ci_data.py --rows 600

      - name: Train model (default params, no grid search for speed)
        run: PYTHONPATH=. python src/models/train.py --data Data/maintenance_ci.csv --no-search

      - name: Verify artefacts
        run: |
          test -f model.pkl           && echo "model.pkl          OK"
          test -f artifacts/meta.json && echo "artifacts/meta.json OK"

      - name: Validate meta.json schema
        run: |
          python3 -c "
          import json
          meta = json.loads(open('artifacts/meta.json').read())
          for key in ('best_params', 'threshold', 'metrics', 'feature_importance', 'training_stats'):
              assert key in meta, f'Missing key in meta.json: {key}'
          assert isinstance(meta['threshold'], float)
          assert 0.0 < meta['threshold'] < 1.0
          m = meta['metrics']
          assert 'f1' in m and 'roc_auc' in m and 'precision' in m and 'recall' in m
          assert len(meta['training_stats']) > 0, 'training_stats must not be empty'
          print('meta.json valid — keys:', list(meta.keys()))
          "

      - name: Smoke test inference
        run: |
          PYTHONPATH=. python -c "
          import uuid
          from src.serving.inference import load_model, predict

          load_model()  # explicit startup — no module-level side effects
          result = predict({
              'Type': 'M',
              'Air_temperature': 298.1,
              'Process_temperature': 308.6,
              'Rotational_speed': 1551,
              'Torque': 42.8,
              'Tool_wear': 0,
          })

          assert result['prediction'] in (0, 1),           'prediction must be 0 or 1'
          assert 0.0 <= result['probability'] <= 1.0,      'probability out of range'
          assert len(result['top_factors']) == 3,          'expected 3 top factors'
          assert all(f['importance'] >= 0 for f in result['top_factors'])
          assert uuid.UUID(result['request_id']).version == 4, 'request_id is not UUID v4'
          print('Smoke test passed — risk:', result['risk_level'],
                '| request_id:', result['request_id'])
          "

      - name: Smoke test batch inference
        run: |
          PYTHONPATH=. python -c "
          from src.serving.inference import load_model, predict_batch

          load_model()  # explicit startup
          inputs = [
              {'Type': 'M', 'Air_temperature': 298.1, 'Process_temperature': 308.6,
               'Rotational_speed': 1551, 'Torque': 42.8, 'Tool_wear': 0},
              {'Type': 'H', 'Air_temperature': 310.0, 'Process_temperature': 322.0,
               'Rotational_speed': 1800, 'Torque': 68.0, 'Tool_wear': 220},
          ]
          results = predict_batch(inputs)
          assert len(results) == 2, f'Expected 2 results, got {len(results)}'
          assert all(r.get('success') for r in results), 'All rows should succeed'
          print('Batch smoke test passed — results:', [(r.get('risk_level'), r.get('probability')) for r in results])
          "

  # -------------------------------------------------------------------------
  # Stage 3: Docker build + health check (main branch only)
  # -------------------------------------------------------------------------
  docker:
    name: Docker build and health check
    runs-on: ubuntu-latest
    needs: [unit-tests, pipeline-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and train
        run: |
          pip install --upgrade pip
          pip install -e .
          PYTHONPATH=. python scripts/generate_ci_data.py --rows 600
          PYTHONPATH=. python src/models/train.py --data Data/maintenance_ci.csv --no-search

      - name: Build Docker image
        run: docker build -t pm-api:${{ github.sha }} .

      - name: Start container and verify health endpoint
        run: |
          docker run -d --name pm_test -p 8000:8000 \
            -e MODEL_PATH=/app/model.pkl \
            pm-api:${{ github.sha }}

          echo "Waiting for server to be ready..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/ && echo "Server ready after ${i} attempts" && break
            echo "Attempt $i failed — retrying in 3s"
            sleep 3
          done || (docker logs pm_test && exit 1)

          STATUS=$(curl -sf http://localhost:8000/ | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Server status: $STATUS"
          test "$STATUS" = "ok" || (echo "Server in degraded state" && docker logs pm_test && exit 1)

          docker stop pm_test
